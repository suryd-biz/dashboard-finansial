<!DOCTYPE html>
<html lang="id" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suryadi Asset Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
</head>
<body class="bg-slate-50 dark:bg-slate-900 transition-colors duration-300 min-h-screen pb-12">

    <div class="bg-slate-900 dark:bg-black pb-32 pt-8 px-4 transition-colors duration-300">
        <div class="max-w-5xl mx-auto flex justify-between items-center text-white">
            <div>
                <h1 class="text-xl md:text-2xl font-bold tracking-tight">Financial Dashboard</h1>
                <p class="text-slate-400 text-xs mt-1" id="date-now">Sinkronisasi terakhir...</p>
            </div>
            <div class="flex gap-3">
                <button id="theme-toggle" class="bg-slate-800 hover:bg-slate-700 p-3 rounded-xl transition">
                    <i class="fa-solid fa-moon" id="theme-icon"></i>
                </button>
                <button onclick="location.reload()" class="bg-indigo-600 hover:bg-indigo-500 p-3 rounded-xl transition">
                    <i class="fa-solid fa-arrows-rotate"></i>
                </button>
            </div>
        </div>
    </div>

    <div class="max-w-5xl mx-auto -mt-20 px-4">
        
        <div class="bg-white dark:bg-slate-800 rounded-3xl shadow-xl shadow-slate-200/50 dark:shadow-none p-8 mb-6 border border-slate-100 dark:border-slate-700 text-center transition-colors">
            <span class="text-slate-400 dark:text-slate-400 text-xs font-bold uppercase tracking-widest mb-2">Total Gabungan Aset</span>
            <h2 class="text-4xl md:text-5xl font-extrabold text-slate-900 dark:text-white mb-4 mt-2" id="total-saldo">Rp 0</h2>
            <div id="total-diff" class="inline-block text-sm font-bold px-4 py-1.5 rounded-full">--</div>
        </div>

        <div id="accounts-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-5 gap-4 mb-8">
            </div>

        <div class="bg-white dark:bg-slate-800 rounded-3xl shadow-sm border border-slate-100 dark:border-slate-700 overflow-hidden transition-colors">
            <div class="px-6 py-5 border-b border-slate-50 dark:border-slate-700 flex justify-between items-center">
                <h3 class="font-bold text-slate-900 dark:text-white">Riwayat Transaksi</h3>
                <span class="text-xs bg-slate-100 dark:bg-slate-700 text-slate-600 dark:text-slate-300 px-3 py-1.5 rounded-lg font-medium" id="page-info">Halaman 1</span>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-slate-50/50 dark:bg-slate-800 text-slate-400 dark:text-slate-400 text-[10px] uppercase tracking-tighter">
                            <th class="px-6 py-4 font-bold">Tanggal</th>
                            <th class="px-6 py-4 font-bold text-right">Saldo Total</th>
                            <th class="px-6 py-4 font-bold text-right">Selisih</th>
                            <th class="px-6 py-4 font-bold">Keterangan</th>
                        </tr>
                    </thead>
                    <tbody id="history-body" class="divide-y divide-slate-50 dark:divide-slate-700">
                        </tbody>
                </table>
            </div>
            
            <div class="px-6 py-4 bg-slate-50 dark:bg-slate-800/50 flex justify-between items-center border-t border-slate-100 dark:border-slate-700">
                <button id="btn-prev" onclick="changePage(-1)" class="px-4 py-2 text-sm font-medium text-slate-600 dark:text-slate-300 bg-white dark:bg-slate-700 rounded-lg shadow-sm border border-slate-200 dark:border-slate-600 disabled:opacity-50 disabled:cursor-not-allowed hover:bg-slate-50 dark:hover:bg-slate-600 transition">
                    <i class="fa-solid fa-chevron-left mr-1"></i> Sebelumnya
                </button>
                <button id="btn-next" onclick="changePage(1)" class="px-4 py-2 text-sm font-medium text-slate-600 dark:text-slate-300 bg-white dark:bg-slate-700 rounded-lg shadow-sm border border-slate-200 dark:border-slate-600 disabled:opacity-50 disabled:cursor-not-allowed hover:bg-slate-50 dark:hover:bg-slate-600 transition">
                    Selanjutnya <i class="fa-solid fa-chevron-right ml-1"></i>
                </button>
            </div>
        </div>
    </div>

    <script>
        // MASUKKAN URL APPS SCRIPT ANDA DI SINI
        const API_URL = 'https://script.google.com/macros/s/AKfycbwNpR6fbf9N4FynWgu9wuefPBl-7kgtpZhougkmMee5eyF_NB1sUJ30zr-QCd6eXYs-oQ/exec';

        // Daftar 10 Akun untuk di-loop
        const accountsList = [
            { id: 'bni', name: 'BNI' }, { id: 'seabank', name: 'SeaBank' },
            { id: 'bibit', name: 'Bibit' }, { id: 'tunai', name: 'Tunai' },
            { id: 'flip', name: 'Flip' }, { id: 'ovo', name: 'Ovo' },
            { id: 'shopeepay', name: 'ShopeePay' }, { id: 'dana', name: 'DANA' },
            { id: 'jago', name: 'Jago' }, { id: 'lain', name: 'Akun Lain' }
        ];

        // Variabel Pagination
        let fullHistory = [];
        let currentPage = 1;
        const rowsPerPage = 10; // Jumlah baris per halaman

        const formatIDR = (n) => new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(n);
        
        // Fungsi membuat Card Bank
        const createAccountCard = (acc, currentVal, prevVal) => {
            const diff = currentVal - prevVal;
            let diffHTML = `<p class="text-[10px] font-bold text-slate-400 dark:text-slate-500"><i class="fa-solid fa-minus"></i> Tetap</p>`;
            
            if (diff > 0) {
                diffHTML = `<p class="text-[10px] font-bold text-emerald-500 dark:text-emerald-400"><i class="fa-solid fa-caret-up"></i> +${formatIDR(diff)}</p>`;
            } else if (diff < 0) {
                diffHTML = `<p class="text-[10px] font-bold text-rose-500 dark:text-rose-400"><i class="fa-solid fa-caret-down"></i> -${formatIDR(Math.abs(diff))}</p>`;
            }

            return `
                <div class="bg-white dark:bg-slate-800 p-4 rounded-2xl border border-slate-100 dark:border-slate-700 shadow-sm transition-colors">
                    <p class="text-slate-400 dark:text-slate-400 text-[10px] font-bold mb-1 uppercase tracking-wider">${acc.name}</p>
                    <p class="font-bold text-slate-900 dark:text-white text-base mb-1 truncate" title="${formatIDR(currentVal)}">${formatIDR(currentVal)}</p>
                    ${diffHTML}
                </div>
            `;
        };

        async function loadData() {
            try {
                document.getElementById('total-saldo').innerText = "Memuat...";
                const res = await fetch(API_URL);
                const rawData = await res.json();
                
                // Menghitung perubahan (diff) untuk riwayat sebelum array dibalik
                const processedData = rawData.map((item, index) => {
                    const prior = index > 0 ? rawData[index - 1] : item;
                    item.change = item.total - prior.total;
                    return item;
                });

                const latest = processedData[processedData.length - 1];
                const prev = processedData.length > 1 ? processedData[processedData.length - 2] : latest;

                // 1. Update UI Total
                document.getElementById('total-saldo').innerText = formatIDR(latest.total);
                document.getElementById('date-now').innerText = "Update: " + new Date(latest.tanggal).toLocaleDateString('id-ID', {day:'2-digit', month:'long', year:'numeric'});

                const tDiff = latest.total - prev.total;
                const tEl = document.getElementById('total-diff');
                if(tDiff > 0) { tEl.className = "text-sm font-bold px-4 py-1.5 rounded-full bg-emerald-50 dark:bg-emerald-900/30 text-emerald-600 dark:text-emerald-400"; tEl.innerHTML = `Naik ${formatIDR(tDiff)}`; }
                else if(tDiff < 0) { tEl.className = "text-sm font-bold px-4 py-1.5 rounded-full bg-rose-50 dark:bg-rose-900/30 text-rose-600 dark:text-rose-400"; tEl.innerHTML = `Turun ${formatIDR(Math.abs(tDiff))}`; }
                else { tEl.className = "text-sm font-bold px-4 py-1.5 rounded-full bg-slate-100 dark:bg-slate-700 text-slate-500 dark:text-slate-300"; tEl.innerHTML = `Stabil`; }

                // 2. Render Grid Akun
                const gridHtml = accountsList.map(acc => createAccountCard(acc, latest[acc.id], prev[acc.id])).join('');
                document.getElementById('accounts-grid').innerHTML = gridHtml;

                // 3. Persiapkan Pagination Riwayat (Balikkan urutan agar terbaru di atas)
                fullHistory = processedData.reverse();
                renderTable();

            } catch (e) { 
                console.error(e);
                alert("Gagal memuat data. Periksa kembali URL API Apps Script."); 
            }
        }

        // Fungsi Render Tabel Sesuai Halaman
        function renderTable() {
            const tbody = document.getElementById('history-body');
            tbody.innerHTML = '';

            const startIndex = (currentPage - 1) * rowsPerPage;
            const endIndex = startIndex + rowsPerPage;
            const pageData = fullHistory.slice(startIndex, endIndex);

            pageData.forEach(item => {
                const changeClass = item.change > 0 ? 'text-emerald-500 dark:text-emerald-400' : (item.change < 0 ? 'text-rose-500 dark:text-rose-400' : 'text-slate-300 dark:text-slate-500');
                const changeIcon = item.change > 0 ? '↑' : (item.change < 0 ? '↓' : '•');

                tbody.innerHTML += `
                    <tr class="hover:bg-slate-50 dark:hover:bg-slate-700/50 transition duration-200">
                        <td class="px-6 py-4 text-xs font-medium text-slate-500 dark:text-slate-400 italic">
                            ${new Date(item.tanggal).toLocaleDateString('id-ID', {day:'2-digit', month:'short'})}
                        </td>
                        <td class="px-6 py-4 text-sm font-bold text-slate-800 dark:text-white text-right">
                            ${formatIDR(item.total)}
                        </td>
                        <td class="px-6 py-4 text-[10px] font-black text-right ${changeClass}">
                            ${changeIcon} ${formatIDR(Math.abs(item.change))}
                        </td>
                        <td class="px-6 py-4 text-xs text-slate-500 dark:text-slate-400 font-medium">
                            ${item.keterangan}
                        </td>
                    </tr>
                `;
            });

            // Update Tombol & Info
            const totalPages = Math.ceil(fullHistory.length / rowsPerPage);
            document.getElementById('page-info').innerText = `Halaman ${currentPage} dari ${totalPages || 1}`;
            document.getElementById('btn-prev').disabled = currentPage === 1;
            document.getElementById('btn-next').disabled = currentPage >= totalPages || totalPages === 0;
        }

        // Fungsi Ganti Halaman
        function changePage(direction) {
            currentPage += direction;
            renderTable();
        }

        // --- Logika Dark Mode ---
        const themeToggleBtn = document.getElementById('theme-toggle');
        const themeIcon = document.getElementById('theme-icon');
        const html = document.documentElement;

        // Cek LocalStorage
        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            html.classList.add('dark');
            themeIcon.classList.replace('fa-moon', 'fa-sun');
        }

        themeToggleBtn.addEventListener('click', () => {
            html.classList.toggle('dark');
            if (html.classList.contains('dark')) {
                localStorage.theme = 'dark';
                themeIcon.classList.replace('fa-moon', 'fa-sun');
            } else {
                localStorage.theme = 'light';
                themeIcon.classList.replace('fa-sun', 'fa-moon');
            }
        });

        // Jalankan saat load
        loadData();
    </script>
</body>
</html>
