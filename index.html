<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suryadi Asset Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-12">

    <div class="bg-slate-900 pb-32 pt-10 px-4">
        <div class="max-w-4xl mx-auto flex justify-between items-center text-white">
            <div>
                <h1 class="text-xl font-bold tracking-tight">Financial Dashboard</h1>
                <p class="text-slate-400 text-xs" id="date-now">Sinkronisasi terakhir...</p>
            </div>
            <button onclick="location.reload()" class="bg-slate-800 hover:bg-slate-700 p-2.5 rounded-xl transition">
                <i class="fa-solid fa-arrows-rotate"></i>
            </button>
        </div>
    </div>

    <div class="max-w-4xl mx-auto -mt-20 px-4">
        <div class="bg-white rounded-3xl shadow-xl shadow-slate-200/50 p-8 mb-6 border border-slate-100">
            <div class="flex flex-col items-center text-center">
                <span class="text-slate-400 text-xs font-bold uppercase tracking-widest mb-2">Total Gabungan</span>
                <h2 class="text-4xl md:text-5xl font-extrabold text-slate-900 mb-4" id="total-saldo">Rp 0</h2>
                <div id="total-diff" class="text-sm font-bold px-4 py-1.5 rounded-full">--</div>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8">
            <div class="bg-white p-5 rounded-2xl border border-slate-100 shadow-sm">
                <p class="text-slate-400 text-xs font-bold mb-2 uppercase">BNI</p>
                <p class="font-bold text-slate-900 text-lg mb-1" id="val-bni">Rp 0</p>
                <p class="text-[10px] font-bold" id="diff-bni">--</p>
            </div>
            <div class="bg-white p-5 rounded-2xl border border-slate-100 shadow-sm">
                <p class="text-slate-400 text-xs font-bold mb-2 uppercase">SeaBank</p>
                <p class="font-bold text-slate-900 text-lg mb-1" id="val-seabank">Rp 0</p>
                <p class="text-[10px] font-bold" id="diff-seabank">--</p>
            </div>
            <div class="bg-white p-5 rounded-2xl border border-slate-100 shadow-sm">
                <p class="text-slate-400 text-xs font-bold mb-2 uppercase">Bibit</p>
                <p class="font-bold text-slate-900 text-lg mb-1" id="val-bibit">Rp 0</p>
                <p class="text-[10px] font-bold" id="diff-bibit">--</p>
            </div>
            <div class="bg-white p-5 rounded-2xl border border-slate-100 shadow-sm">
                <p class="text-slate-400 text-xs font-bold mb-2 uppercase">Tunai</p>
                <p class="font-bold text-slate-900 text-lg mb-1" id="val-tunai">Rp 0</p>
                <p class="text-[10px] font-bold" id="diff-tunai">--</p>
            </div>
        </div>

        <div class="bg-white rounded-3xl shadow-sm border border-slate-100 overflow-hidden">
            <div class="px-6 py-5 border-b border-slate-50 flex justify-between items-center">
                <h3 class="font-bold text-slate-900">Riwayat Transaksi Lengkap</h3>
                <i class="fa-solid fa-clock-rotate-left text-slate-300"></i>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-slate-50/50 text-slate-400 text-[10px] uppercase tracking-tighter">
                            <th class="px-6 py-4 font-bold">Tanggal</th>
                            <th class="px-6 py-4 font-bold text-right">Saldo Total</th>
                            <th class="px-6 py-4 font-bold text-right text-indigo-600">Selisih</th>
                            <th class="px-6 py-4 font-bold">Keterangan</th>
                        </tr>
                    </thead>
                    <tbody id="history-body" class="divide-y divide-slate-50">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbwNpR6fbf9N4FynWgu9wuefPBl-7kgtpZhougkmMee5eyF_NB1sUJ30zr-QCd6eXYs-oQ/exec';

        const formatIDR = (n) => new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(n);
        
        const setDiffUI = (el, diff) => {
            if (diff > 0) {
                el.className = 'text-[10px] font-bold text-emerald-500';
                el.innerHTML = `<i class="fa-solid fa-caret-up"></i> +${formatIDR(diff)}`;
            } else if (diff < 0) {
                el.className = 'text-[10px] font-bold text-rose-500';
                el.innerHTML = `<i class="fa-solid fa-caret-down"></i> -${formatIDR(Math.abs(diff))}`;
            } else {
                el.className = 'text-[10px] font-bold text-slate-300';
                el.innerHTML = `<i class="fa-solid fa-minus"></i> Tetap`;
            }
        };

        async function init() {
            try {
                const res = await fetch(API_URL);
                const data = await res.json();
                
                const latest = data[data.length - 1];
                const prev = data.length > 1 ? data[data.length - 2] : latest;

                // Update UI Utama
                document.getElementById('total-saldo').innerText = formatIDR(latest.total);
                document.getElementById('val-bni').innerText = formatIDR(latest.bni);
                document.getElementById('val-seabank').innerText = formatIDR(latest.seabank);
                document.getElementById('val-bibit').innerText = formatIDR(latest.bibit);
                document.getElementById('val-tunai').innerText = formatIDR(latest.tunai);
                document.getElementById('date-now').innerText = "Update: " + new Date(latest.tanggal).toLocaleDateString('id-ID', {day:'2-digit', month:'short', year:'numeric'});

                // Perubahan Tiap Akun
                setDiffUI(document.getElementById('diff-bni'), latest.bni - prev.bni);
                setDiffUI(document.getElementById('diff-seabank'), latest.seabank - prev.seabank);
                setDiffUI(document.getElementById('diff-bibit'), latest.bibit - prev.bibit);
                setDiffUI(document.getElementById('diff-tunai'), latest.tunai - prev.tunai);
                
                // Perubahan Total (Besar)
                const tDiff = latest.total - prev.total;
                const tEl = document.getElementById('total-diff');
                if(tDiff > 0) { tEl.className += " bg-emerald-50 text-emerald-600"; tEl.innerHTML = `Naik ${formatIDR(tDiff)}`; }
                else if(tDiff < 0) { tEl.className += " bg-rose-50 text-rose-600"; tEl.innerHTML = `Turun ${formatIDR(Math.abs(tDiff))}`; }
                else { tEl.className += " bg-slate-100 text-slate-500"; tEl.innerHTML = `Stabil`; }

                // Render Riwayat Tak Terbatas
                const tbody = document.getElementById('history-body');
                tbody.innerHTML = '';
                
                // Loop terbalik agar terbaru di atas
                for(let i = data.length - 1; i >= 0; i--) {
                    const current = data[i];
                    const prior = i > 0 ? data[i-1] : current;
                    const change = current.total - prior.total;
                    const changeClass = change > 0 ? 'text-emerald-500' : (change < 0 ? 'text-rose-500' : 'text-slate-300');
                    const changeIcon = change > 0 ? '↑' : (change < 0 ? '↓' : '•');

                    tbody.innerHTML += `
                        <tr class="hover:bg-slate-50/50 transition duration-200">
                            <td class="px-6 py-4 text-xs font-medium text-slate-500 italic">
                                ${new Date(current.tanggal).toLocaleDateString('id-ID', {day:'2-digit', month:'2-digit'})}
                            </td>
                            <td class="px-6 py-4 text-sm font-bold text-slate-800 text-right uppercase">
                                ${formatIDR(current.total)}
                            </td>
                            <td class="px-6 py-4 text-[10px] font-black text-right ${changeClass}">
                                ${changeIcon} ${formatIDR(Math.abs(change))}
                            </td>
                            <td class="px-6 py-4 text-[11px] text-slate-400 font-medium">
                                ${current.keterangan}
                            </td>
                        </tr>
                    `;
                }
            } catch (e) { alert("Data gagal dimuat. Cek URL API."); }
        }
        init();
    </script>
</body>
</html>
