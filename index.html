<!DOCTYPE html>
<html lang="id" class="light">
<head>
    <link rel="manifest" href="manifest.json">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suryadi Finance</title>
    <link rel="icon" type="image/x-icon" href="fav.ico">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            /* Latar belakang halaman yang lebih elegan */
            background-attachment: fixed;
        }
        .card-animate { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .modal-active { display: flex !important; animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95) translateY(10px); } to { opacity: 1; transform: scale(1) translateY(0); } }
        
        /* Custom Scrollbar Elegan */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .dark ::-webkit-scrollbar-thumb { background: #475569; }
    </style>
    <script>tailwind.config = { darkMode: 'class' }</script>
</head>
<body class="bg-gradient-to-br from-slate-50 via-indigo-50/30 to-purple-50/50 dark:from-slate-950 dark:via-indigo-950/20 dark:to-slate-900 transition-colors duration-500 min-h-screen pb-24 relative">

    <div class="bg-gradient-to-r from-indigo-700 via-violet-700 to-fuchsia-700 dark:from-slate-900 dark:via-indigo-950 dark:to-slate-900 pb-32 pt-8 px-4 shadow-lg shadow-indigo-900/20 transition-colors duration-500">
        <div class="max-w-5xl mx-auto flex justify-between items-center text-white">
            <div>
                <h1 class="text-2xl md:text-3xl font-extrabold tracking-tight bg-clip-text text-transparent bg-gradient-to-r from-white to-indigo-200 drop-shadow-sm">SYD Financial</h1>
                <p class="text-indigo-200 dark:text-indigo-400 text-xs mt-1 font-medium flex items-center gap-1" id="date-now"><i class="fa-solid fa-clock fa-spin-pulse opacity-50"></i> Sinkronisasi terakhir...</p>
            </div>
            <div class="flex gap-3">
                <button id="theme-toggle" class="bg-white/10 hover:bg-white/20 backdrop-blur-md border border-white/10 p-3.5 rounded-2xl transition-all active:scale-90 shadow-lg">
                    <i class="fa-solid fa-moon text-indigo-100" id="theme-icon"></i>
                </button>
                <button onclick="loadData()" class="bg-white text-indigo-600 hover:bg-indigo-50 dark:bg-indigo-500 dark:text-white dark:hover:bg-indigo-400 p-3.5 rounded-2xl transition-all active:scale-90 shadow-lg shadow-black/10">
                    <i class="fa-solid fa-arrows-rotate" id="reload-icon"></i>
                </button>
            </div>
        </div>
    </div>

    <div class="max-w-5xl mx-auto -mt-20 px-4">
        
        <div class="group bg-white/80 dark:bg-slate-800/90 backdrop-blur-xl rounded-[2rem] shadow-2xl shadow-indigo-200/40 dark:shadow-none p-8 md:p-10 mb-8 border border-white dark:border-slate-700 text-center cursor-pointer card-animate hover:-translate-y-2 hover:shadow-indigo-300/50 hover:border-indigo-300 dark:hover:border-indigo-500 overflow-hidden relative">
            <div class="absolute -top-24 -right-24 w-48 h-48 bg-gradient-to-br from-fuchsia-400 to-indigo-400 rounded-full blur-3xl opacity-10 group-hover:opacity-20 transition-opacity"></div>
            <div class="absolute -bottom-24 -left-24 w-48 h-48 bg-gradient-to-tr from-cyan-400 to-blue-400 rounded-full blur-3xl opacity-10 group-hover:opacity-20 transition-opacity"></div>
            
            <span class="relative text-slate-500 dark:text-slate-400 text-xs font-black uppercase tracking-[0.2em] mb-2 block group-hover:text-indigo-600 dark:group-hover:text-indigo-400 transition-colors">Total Gabungan Aset</span>
            <h2 class="relative text-4xl sm:text-5xl md:text-6xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-slate-900 via-indigo-800 to-violet-800 dark:from-white dark:via-indigo-200 dark:to-cyan-200 mb-6 mt-3 truncate w-full tracking-tight" id="total-saldo">Rp 0</h2>
            <div id="total-diff" class="relative inline-block text-sm font-bold px-5 py-2 rounded-full card-animate group-hover:scale-105 shadow-sm">--</div>
        </div>

        <div id="accounts-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-5 gap-4 mb-10"></div>

        <div class="bg-white/90 dark:bg-slate-800/90 backdrop-blur-xl rounded-[2rem] shadow-xl shadow-slate-200/40 dark:shadow-none border border-white dark:border-slate-700 overflow-hidden">
            <div class="px-6 py-5 border-b border-slate-100 dark:border-slate-700/50 flex justify-between items-center bg-gradient-to-r from-slate-50 to-white dark:from-slate-800 dark:to-slate-800/50">
                <h3 class="font-extrabold text-slate-900 dark:text-white flex items-center gap-2"><i class="fa-solid fa-list-check text-indigo-500"></i> Riwayat Transaksi</h3>
                <span class="text-xs bg-gradient-to-r from-indigo-100 to-violet-100 dark:from-indigo-900/50 dark:to-violet-900/50 text-indigo-700 dark:text-indigo-300 px-4 py-1.5 rounded-xl font-bold border border-indigo-200 dark:border-indigo-800 shadow-inner" id="page-info">Hal 1</span>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-slate-50/80 dark:bg-slate-800/80 text-slate-500 dark:text-slate-400 text-[10px] uppercase tracking-wider">
                            <th class="px-6 py-4 font-bold">Tanggal</th>
                            <th class="px-6 py-4 font-bold text-right">Saldo Total</th>
                            <th class="px-6 py-4 font-bold text-right">Selisih</th>
                            <th class="px-6 py-4 font-bold">Keterangan</th>
                            <th class="px-6 py-4 font-bold text-center">Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="history-body" class="divide-y divide-slate-100 dark:divide-slate-700/50"></tbody>
                </table>
            </div>
            <div class="px-6 py-5 bg-slate-50/50 dark:bg-slate-800/30 flex justify-between items-center border-t border-slate-100 dark:border-slate-700/50">
                <button id="btn-prev" onclick="changePage(-1)" class="px-5 py-2.5 text-sm font-bold text-slate-600 dark:text-slate-300 bg-white dark:bg-slate-700 rounded-xl shadow-sm border border-slate-200 dark:border-slate-600 disabled:opacity-40 hover:text-indigo-600 dark:hover:text-indigo-400 hover:border-indigo-300 hover:shadow-indigo-100 transition-all active:scale-95"><i class="fa-solid fa-arrow-left-long mr-2"></i> Prev</button>
                <button id="btn-next" onclick="changePage(1)" class="px-5 py-2.5 text-sm font-bold text-slate-600 dark:text-slate-300 bg-white dark:bg-slate-700 rounded-xl shadow-sm border border-slate-200 dark:border-slate-600 disabled:opacity-40 hover:text-indigo-600 dark:hover:text-indigo-400 hover:border-indigo-300 hover:shadow-indigo-100 transition-all active:scale-95">Next <i class="fa-solid fa-arrow-right-long ml-2"></i></button>
            </div>
        </div>
    </div>

    <button onclick="openModalNew()" class="fixed bottom-8 right-8 md:bottom-10 md:right-10 w-16 h-16 bg-gradient-to-tr from-indigo-600 to-fuchsia-500 hover:from-indigo-500 hover:to-fuchsia-400 text-white rounded-full shadow-[0_10px_25px_rgba(99,102,241,0.5)] flex items-center justify-center text-2xl transition-all hover:scale-110 hover:rotate-90 active:scale-90 z-40">
        <i class="fa-solid fa-plus"></i>
    </button>

    <div id="modal-input" class="fixed inset-0 bg-slate-900/40 dark:bg-slate-900/80 backdrop-blur-md z-50 hidden items-center justify-center p-4">
        <div class="bg-white/95 dark:bg-slate-800/95 backdrop-blur-xl w-full max-w-lg rounded-[2rem] p-8 shadow-2xl overflow-y-auto max-h-[90vh] border border-white dark:border-slate-700">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-2xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-indigo-600 to-fuchsia-600 dark:from-indigo-300 dark:to-fuchsia-300" id="modal-title">Update Saldo</h3>
                <button onclick="toggleModal()" class="text-slate-400 hover:text-rose-600 bg-slate-100 hover:bg-rose-100 dark:bg-slate-700 dark:hover:bg-rose-900/50 w-10 h-10 rounded-full flex items-center justify-center transition-all active:scale-90"><i class="fa-solid fa-xmark text-lg"></i></button>
            </div>
            
            <form id="form-update" class="space-y-5">
                <div class="grid grid-cols-2 gap-4">
                    <div class="col-span-2">
                        <label class="block text-xs font-black text-slate-500 mb-1.5 tracking-wider">TANGGAL UPDATE</label>
                        <input type="date" id="in-tanggal" required class="w-full bg-slate-50 dark:bg-slate-900/50 border border-slate-200 dark:border-slate-700 p-3.5 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none font-medium text-slate-800 dark:text-white transition-all shadow-inner">
                    </div>
                    <div><label class="text-[10px] font-black text-slate-400 uppercase tracking-widest">BNI</label><input type="number" id="in-bni" class="w-full bg-slate-50 dark:bg-slate-900/50 border border-slate-200 dark:border-slate-700 p-3 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500 font-semibold text-slate-800 dark:text-white transition-all"></div>
                    <div><label class="text-[10px] font-black text-slate-400 uppercase tracking-widest">SEABANK</label><input type="number" id="in-seabank" class="w-full bg-slate-50 dark:bg-slate-900/50 border border-slate-200 dark:border-slate-700 p-3 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500 font-semibold text-slate-800 dark:text-white transition-all"></div>
                    <div><label class="text-[10px] font-black text-slate-400 uppercase tracking-widest">BIBIT</label><input type="number" id="in-bibit" class="w-full bg-slate-50 dark:bg-slate-900/50 border border-slate-200 dark:border-slate-700 p-3 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500 font-semibold text-slate-800 dark:text-white transition-all"></div>
                    <div><label class="text-[10px] font-black text-slate-400 uppercase tracking-widest">TUNAI</label><input type="number" id="in-tunai" class="w-full bg-slate-50 dark:bg-slate-900/50 border border-slate-200 dark:border-slate-700 p-3 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500 font-semibold text-slate-800 dark:text-white transition-all"></div>
                    <div><label class="text-[10px] font-black text-slate-400 uppercase tracking-widest">FLIP</label><input type="number" id="in-flip" class="w-full bg-slate-50 dark:bg-slate-900/50 border border-slate-200 dark:border-slate-700 p-3 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500 font-semibold text-slate-800 dark:text-white transition-all"></div>
                    <div><label class="text-[10px] font-black text-slate-400 uppercase tracking-widest">OVO</label><input type="number" id="in-ovo" class="w-full bg-slate-50 dark:bg-slate-900/50 border border-slate-200 dark:border-slate-700 p-3 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500 font-semibold text-slate-800 dark:text-white transition-all"></div>
                    <div><label class="text-[10px] font-black text-slate-400 uppercase tracking-widest">SHOPEEPAY</label><input type="number" id="in-shopeepay" class="w-full bg-slate-50 dark:bg-slate-900/50 border border-slate-200 dark:border-slate-700 p-3 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500 font-semibold text-slate-800 dark:text-white transition-all"></div>
                    <div><label class="text-[10px] font-black text-slate-400 uppercase tracking-widest">DANA</label><input type="number" id="in-dana" class="w-full bg-slate-50 dark:bg-slate-900/50 border border-slate-200 dark:border-slate-700 p-3 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500 font-semibold text-slate-800 dark:text-white transition-all"></div>
                    <div><label class="text-[10px] font-black text-slate-400 uppercase tracking-widest">JAGO</label><input type="number" id="in-jago" class="w-full bg-slate-50 dark:bg-slate-900/50 border border-slate-200 dark:border-slate-700 p-3 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500 font-semibold text-slate-800 dark:text-white transition-all"></div>
                    <div><label class="text-[10px] font-black text-slate-400 uppercase tracking-widest">LAINNYA</label><input type="number" id="in-lain" class="w-full bg-slate-50 dark:bg-slate-900/50 border border-slate-200 dark:border-slate-700 p-3 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500 font-semibold text-slate-800 dark:text-white transition-all"></div>
                    <div class="col-span-2">
                        <label class="block text-xs font-black text-slate-500 mb-1.5 tracking-wider">KETERANGAN</label>
                        <input type="text" id="in-keterangan" placeholder="Contoh: Terima Gaji, Project PHO..." class="w-full bg-slate-50 dark:bg-slate-900/50 border border-slate-200 dark:border-slate-700 p-3.5 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500 font-medium text-slate-800 dark:text-white transition-all">
                    </div>
                </div>
                <button type="submit" id="btn-submit" class="w-full bg-gradient-to-r from-indigo-600 to-violet-600 hover:from-indigo-500 hover:to-violet-500 text-white font-extrabold p-4 rounded-2xl shadow-lg shadow-indigo-200 dark:shadow-none transition-all active:scale-95 mt-4 tracking-wider flex justify-center items-center gap-2">
                    <i class="fa-solid fa-paper-plane"></i> SIMPAN DATA
                </button>
            </form>
        </div>
    </div>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbwNpR6fbf9N4FynWgu9wuefPBl-7kgtpZhougkmMee5eyF_NB1sUJ30zr-QCd6eXYs-oQ/exec'; 

        const accountsList = [
            { id: 'bni', name: 'BNI' }, { id: 'seabank', name: 'SeaBank' }, { id: 'bibit', name: 'Bibit' }, 
            { id: 'tunai', name: 'Tunai' }, { id: 'flip', name: 'Flip' }, { id: 'ovo', name: 'Ovo' }, 
            { id: 'shopeepay', name: 'ShopeePay' }, { id: 'dana', name: 'DANA' }, { id: 'jago', name: 'Jago' }, { id: 'lain', name: 'Lain' }
        ];

        let fullHistory = [], latestData = {};
        let currentPage = 1, rowsPerPage = 10;
        let formAction = 'insert', editOriginalTanggal = '';

        const formatIDR = (n) => new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(n);
        
        // Pembaruan UI Hover pada Card Bank
        const createAccountCard = (acc, currentVal, prevVal) => {
            const diff = currentVal - prevVal;
            let diffHTML = `<p class="text-[10px] font-bold text-slate-400 bg-slate-100 dark:bg-slate-700/50 inline-block px-2 py-0.5 rounded-md mt-1"><i class="fa-solid fa-minus"></i> Tetap</p>`;
            if (diff > 0) diffHTML = `<p class="text-[10px] font-bold text-emerald-600 dark:text-emerald-400 bg-emerald-50 dark:bg-emerald-900/30 inline-block px-2 py-0.5 rounded-md mt-1"><i class="fa-solid fa-arrow-trend-up"></i> +${formatIDR(diff)}</p>`;
            else if (diff < 0) diffHTML = `<p class="text-[10px] font-bold text-rose-600 dark:text-rose-400 bg-rose-50 dark:bg-rose-900/30 inline-block px-2 py-0.5 rounded-md mt-1"><i class="fa-solid fa-arrow-trend-down"></i> -${formatIDR(Math.abs(diff))}</p>`;

            return `<div class="group bg-white/80 dark:bg-slate-800/80 backdrop-blur-lg p-4 sm:p-5 rounded-3xl border border-white dark:border-slate-700 shadow-sm hover:-translate-y-2 hover:shadow-xl hover:shadow-indigo-100 dark:hover:shadow-indigo-900/20 hover:border-indigo-200 dark:hover:border-indigo-500 hover:bg-gradient-to-br hover:from-white hover:to-indigo-50 dark:hover:from-slate-800 dark:hover:to-slate-700 transition-all card-animate cursor-pointer">
                    <div class="w-8 h-8 rounded-full bg-slate-50 dark:bg-slate-700 flex items-center justify-center mb-3 group-hover:bg-indigo-100 dark:group-hover:bg-indigo-900 transition-colors">
                        <i class="fa-solid fa-wallet text-slate-400 group-hover:text-indigo-500 transition-colors text-xs"></i>
                    </div>
                    <p class="text-[10px] sm:text-xs font-black text-slate-400 uppercase tracking-widest truncate group-hover:text-indigo-500 transition-colors">${acc.name}</p>
                    <p class="font-extrabold text-slate-900 dark:text-white text-base sm:text-lg truncate my-0.5 tracking-tight">${formatIDR(currentVal)}</p>
                    ${diffHTML}</div>`;
        };

        async function loadData() {
            // Jalankan animasi putar pada ikon
            const reloadIcon = document.getElementById('reload-icon');
            if(reloadIcon) reloadIcon.classList.add('fa-spin');

            try {
                if(fullHistory.length === 0) document.getElementById('total-saldo').innerText = "Memuat...";
                
                // Tambahkan parameter waktu (?t=...) agar URL selalu unik & menembus cache browser
                const res = await fetch(API_URL + "?t=" + new Date().getTime(), { cache: 'no-store' });
                const rawData = await res.json();
                
                const processedData = rawData.map((item, index) => {
                    const prior = index > 0 ? rawData[index - 1] : item;
                    item.change = item.total - prior.total;
                    return item;
                });

                latestData = processedData[processedData.length - 1] || {};
                const prev = processedData.length > 1 ? processedData[processedData.length - 2] : latestData;

                document.getElementById('total-saldo').innerText = formatIDR(latestData.total || 0);
                document.getElementById('date-now').innerHTML = `<i class="fa-solid fa-check-circle text-emerald-300"></i> Update: ` + (latestData.tanggal ? new Date(latestData.tanggal).toLocaleDateString('id-ID', {day:'2-digit', month:'long', year:'numeric'}) : '-');

                const tDiff = (latestData.total || 0) - (prev.total || 0);
                const tEl = document.getElementById('total-diff');
                if(tDiff > 0) { tEl.className = "relative inline-block text-xs font-bold px-4 py-1.5 rounded-full bg-gradient-to-r from-emerald-100 to-emerald-50 dark:from-emerald-900/50 dark:to-emerald-800/30 text-emerald-600 dark:text-emerald-400 border border-emerald-200 dark:border-emerald-800"; tEl.innerHTML = `<i class="fa-solid fa-arrow-up"></i> Naik ${formatIDR(tDiff)}`; }
                else if(tDiff < 0) { tEl.className = "relative inline-block text-xs font-bold px-4 py-1.5 rounded-full bg-gradient-to-r from-rose-100 to-rose-50 dark:from-rose-900/50 dark:to-rose-800/30 text-rose-600 dark:text-rose-400 border border-rose-200 dark:border-rose-800"; tEl.innerHTML = `<i class="fa-solid fa-arrow-down"></i> Turun ${formatIDR(Math.abs(tDiff))}`; }
                else { tEl.className = "relative inline-block text-xs font-bold px-4 py-1.5 rounded-full bg-slate-100 dark:bg-slate-700 text-slate-500 border border-slate-200 dark:border-slate-600"; tEl.innerHTML = `Stabil`; }

                document.getElementById('accounts-grid').innerHTML = accountsList.map(acc => createAccountCard(acc, latestData[acc.id] || 0, prev[acc.id] || 0)).join('');

                fullHistory = processedData.reverse();
                renderTable();
            } catch (e) { 
                alert("Gagal memuat data dari Apps Script."); 
            } finally {
                // Hentikan animasi putar setelah data selesai dimuat atau jika terjadi error
                if(reloadIcon) reloadIcon.classList.remove('fa-spin');
            }
        }

        function renderTable() {
            const tbody = document.getElementById('history-body');
            tbody.innerHTML = '';
            const pageData = fullHistory.slice((currentPage - 1) * rowsPerPage, currentPage * rowsPerPage);

            pageData.forEach(item => {
                const changeClass = item.change > 0 ? 'text-emerald-600 dark:text-emerald-400' : (item.change < 0 ? 'text-rose-600 dark:text-rose-400' : 'text-slate-400');
                const changeIcon = item.change > 0 ? '↑' : (item.change < 0 ? '↓' : '•');

                tbody.innerHTML += `
                    <tr class="hover:bg-gradient-to-r hover:from-indigo-50/50 hover:to-transparent dark:hover:from-indigo-900/20 dark:hover:to-transparent transition-colors group">
                        <td class="px-6 py-5 text-xs font-semibold text-slate-500 dark:text-slate-400 whitespace-nowrap"><i class="fa-regular fa-calendar text-slate-300 mr-2 group-hover:text-indigo-400 transition-colors"></i>${new Date(item.tanggal).toLocaleDateString('id-ID', {day:'2-digit', month:'short', year:'numeric'})}</td>
                        <td class="px-6 py-5 text-sm font-extrabold text-slate-800 dark:text-white text-right whitespace-nowrap">${formatIDR(item.total)}</td>
                        <td class="px-6 py-5 text-[10px] font-black text-right ${changeClass} whitespace-nowrap bg-slate-50/50 dark:bg-slate-800/30">${changeIcon} ${formatIDR(Math.abs(item.change))}</td>
                        <td class="px-6 py-5 text-[11px] font-medium text-slate-500 dark:text-slate-400">${item.keterangan}</td>
                        <td class="px-6 py-5 text-center whitespace-nowrap">
                            <button onclick="openModalEdit('${item.raw_tanggal}')" class="text-indigo-400 hover:text-white hover:bg-indigo-500 w-8 h-8 rounded-xl transition-all shadow-sm mr-1" title="Edit"><i class="fa fa-pen text-xs"></i></button>
                            <button onclick="deleteData('${item.raw_tanggal}')" class="text-rose-400 hover:text-white hover:bg-rose-500 w-8 h-8 rounded-xl transition-all shadow-sm" title="Hapus"><i class="fa fa-trash text-xs"></i></button>
                        </td>
                    </tr>
                `;
            });
            document.getElementById('page-info').innerText = `Hal ${currentPage} dari ${Math.ceil(fullHistory.length / rowsPerPage) || 1}`;
            document.getElementById('btn-prev').disabled = currentPage === 1;
            document.getElementById('btn-next').disabled = currentPage >= Math.ceil(fullHistory.length / rowsPerPage);
        }

        function changePage(d) { currentPage += d; renderTable(); }
        function toggleModal() { document.getElementById('modal-input').classList.toggle('modal-active'); }

        function openModalNew() {
            formAction = 'insert';
            document.getElementById('modal-title').innerText = "Catat Saldo Baru";
            document.getElementById('in-tanggal').value = new Date().toISOString().split('T')[0];
            accountsList.forEach(acc => document.getElementById(`in-${acc.id}`).value = latestData[acc.id] || 0);
            document.getElementById('in-keterangan').value = "";
            toggleModal();
        }

        function openModalEdit(dateStr) {
            formAction = 'update';
            editOriginalTanggal = dateStr;
            const targetData = fullHistory.find(d => d.raw_tanggal === dateStr);
            
            document.getElementById('modal-title').innerText = "Edit Data: " + dateStr;
            document.getElementById('in-tanggal').value = dateStr;
            accountsList.forEach(acc => document.getElementById(`in-${acc.id}`).value = targetData[acc.id] || 0);
            document.getElementById('in-keterangan').value = targetData.keterangan === "-" ? "" : targetData.keterangan;
            toggleModal();
        }

        async function deleteData(dateStr) {
            if (!confirm(`Yakin ingin MENGHAPUS permanen data pada tanggal ${dateStr}?`)) return;
            try {
                await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'delete', tanggal: dateStr }) });
                loadData();
            } catch (err) { alert("Gagal menghapus data."); }
        }

        document.getElementById('form-update').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-submit');
            btn.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i> MEMPROSES...`;
            btn.classList.add('opacity-80', 'cursor-not-allowed');
            btn.disabled = true;

            const payload = {
                action: formAction,
                original_tanggal: editOriginalTanggal,
                tanggal: document.getElementById('in-tanggal').value,
                keterangan: document.getElementById('in-keterangan').value || "-",
                ...Object.fromEntries(accountsList.map(acc => [acc.id, Number(document.getElementById(`in-${acc.id}`).value) || 0]))
            };

            try {
                await fetch(API_URL, { method: 'POST', body: JSON.stringify(payload) });
                toggleModal();
                loadData();
            } catch (err) { alert("Gagal menyimpan data. Pastikan jaringan internet stabil."); } 
            finally { 
                btn.innerHTML = `<i class="fa-solid fa-paper-plane"></i> SIMPAN DATA`; 
                btn.classList.remove('opacity-80', 'cursor-not-allowed');
                btn.disabled = false; 
            }
        });

        // Theme Toggle Elegant
        const themeBtn = document.getElementById('theme-toggle'), html = document.documentElement;
        if (localStorage.theme === 'dark') { html.classList.add('dark'); document.getElementById('theme-icon').classList.replace('fa-moon', 'fa-sun'); document.getElementById('theme-icon').classList.replace('text-indigo-100', 'text-yellow-300'); }
        themeBtn.addEventListener('click', () => {
            html.classList.toggle('dark');
            const isDark = html.classList.contains('dark');
            localStorage.theme = isDark ? 'dark' : 'light';
            const icon = document.getElementById('theme-icon');
            icon.className = isDark ? 'fa-solid fa-sun text-yellow-300' : 'fa-solid fa-moon text-indigo-100';
        });

        loadData();
    </script>
</body>
</html>
